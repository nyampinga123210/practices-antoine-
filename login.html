<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login Form</title>

<style>

/* BODY */
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #0d6efd, #0099ff);
    display: flex;
   
    align-items: center;
    height: 100vh;
}

/* CONTAINER */
.container {
    background: white;
    padding: 30px;
    border-radius: 10px;
    width: 350px;
    box-shadow: 0 0 15px rgba(0,0,0,0.2);
}

/* TITLE */
h1 {
    text-align: center;
    color: #0d6efd;
}

/* LABEL */
label {
    font-size: 14px;
    font-weight: bold;
}

/* INPUT */
input {
    width: 100%;
    padding: 10px;
    margin: 5px 0 15px 0;
    border-radius: 5px;
    border: 1px solid #ccc;
}

/* BUTTON */
button {
    width: 100%;
    padding: 10px;
    background: #0d6efd;
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #0044aa;
}

/* LINKS */
.extra {
    text-align: center;
    margin-top: 10px;
}

.extra a {
    text-decoration: none;
    color: #0d6efd;
    cursor: pointer;
}

/* ERROR */
#error {
    color: red;
    font-size: 13px;
    text-align: center;
}

/* FORGOT BOX */
#forgotBox {
    display: none;
}

</style>
</head>

<body>

<div class="container">

<h1>Login</h1>

<form id="loginForm">

<label>Email</label>
<input type="email" id="email" placeholder="Enter email" required>

<label>Password</label>
<input type="password" id="password" placeholder="Enter password" required>

<p id="error"></p>

<button type="submit">Login</button>

<div class="extra">
    <a onclick="showForgot()">Forgot Password?</a><br>
    Don't have an account? <a href="register.html">Register</a>
</div>

</form>

<!-- FORGOT PASSWORD -->
<div id="forgotBox">

<h3>Reset Password</h3>

<input type="email" id="resetEmail" placeholder="Enter your email">
<input type="password" id="newPassword" placeholder="New password">

<button onclick="resetPassword()">Reset Password</button>

<div class="extra">
    <a onclick="backToLogin()">Back to Login</a>
</div>

</div>

</div>

<script>

// LOGIN FUNCTION
document.getElementById("loginForm").addEventListener("submit", function(e){
    e.preventDefault();

    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    let user = JSON.parse(localStorage.getItem("user"));

    if(user && user.email === email && user.password === password){
        alert("Login successful ✅");
        window.location.href = "user-dashboard.html"; // change if needed
    } else {
        document.getElementById("error").innerText = "Invalid email or password ❌";
    }
});


// SHOW FORGOT
function showForgot(){
    document.getElementById("loginForm").style.display = "none";
    document.getElementById("forgotBox").style.display = "block";
}

// BACK TO LOGIN
function backToLogin(){
    document.getElementById("loginForm").style.display = "block";
    document.getElementById("forgotBox").style.display = "none";
}

// RESET PASSWORD
function resetPassword(){
    let email = document.getElementById("resetEmail").value;
    let newPassword = document.getElementById("newPassword").value;

    let user = JSON.parse(localStorage.getItem("user"));

    if(user && user.email === email){
        user.password = newPassword;
        localStorage.setItem("user", JSON.stringify(user));
        alert("Password updated successfully ✅");
        backToLogin();
    } else {
        alert("Email not found ❌");
    }
}

</script>

</body>
</html>
