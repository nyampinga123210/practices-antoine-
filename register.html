<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register Form</title>

<style>

/* BODY STYLE */
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #0d6efd, #0099ff);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CONTAINER */
.container {
    background: white;
    padding: 30px;
    border-radius: 10px;
    width: 350px;
    box-shadow: 0 0 15px rgba(0,0,0,0.2);
}

/* TITLE */
h1 {
    text-align: center;
    color: #0d6efd;
}

/* LABEL */
label {
    font-size: 14px;
    font-weight: bold;
}

/* INPUT FIELDS */
input, select {
    width: 100%;
    padding: 10px;
    margin: 5px 0 15px 0;
    border-radius: 5px;
    border: 1px solid #ccc;
}

/* RADIO GROUP */
.gender {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
}

/* BUTTON */
button {
    width: 100%;
    padding: 10px;
    background: #0d6efd;
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #0044aa;
}

/* LOGIN LINK */
.login-link {
    text-align: center;
    margin-top: 10px;
}

.login-link a {
    text-decoration: none;
    color: #0d6efd;
}

</style>
</head>

<body>

<div class="container">

<h1>Register</h1>

<form>

<label>FullName</label>
<input type="text" placeholder="Enter full name">

<label>Email</label>
<input type="email" placeholder="Enter email">

<label>Password</label>
<input type="password" placeholder="Enter password">

<label>Confirm Password</label>
<input type="password" placeholder="Confirm password">

<!-- ✅ NEW TRADE FIELD -->
<label>Trade</label>
<select>
    <option>-- Select Trade --</option>
    <option>mechanic</option>
    <option >software development</option>
     <optio>networking</option>
    <option >welding</option>
     <option >fashion design</option>
    <option >computer system architecture</option>
     <option >automobile</option>
    <option >maltimedia</option>


</select>

<label>Gender</label>
<div class="gender">
    <label><input type="radio" name="gender"> Female</label>
    <label><input type="radio" name="gender"> Male</label>
</div>

<button type="submit">Register</button>

<div class="login-link">
    Already have an account? <a href="login.html">Login</a>
</div>

</form>

</div>

</body>
</html>
